<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.button {
    display: block;
    width: 220px;
    padding: 12px;
    margin: 8px auto;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    text-decoration: none;
    color: black;
    transition: 0.2s;
}

.button:hover {
    background: #eaeaea;
}
</style>
</head>

<body>

<div class="container">
    <h1>MIN_4IK</h1>
    <div id="buttons"></div>
</div>

<script>
// 👉 добавляешь кнопки здесь
const links = [
    {name: "Telegram", url: "#"},
    {name: "YouTube", url: "#"},
    {name: "Discord", url: "#"}
];

const container = document.getElementById("buttons");

links.forEach(link => {
    const a = document.createElement("a");
    a.className = "button";
    a.href = link.url;
    a.innerText = link.name;
    a.target = "_blank";
    container.appendChild(a);
});
</script>

</body>
</html>
