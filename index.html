<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIN_4IK</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000000; /* тёмный фон */
    color: #ffffff;       /* цвет текста */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.button {
    display: block;
    width: 220px;
    padding: 12px;
    margin: 8px auto;
    background: #252525; /* тёмная кнопка */
    border: 1px solid #333;
    border-radius: 8px;
    text-decoration: none;
    color: #ffffff;
    transition: 0.2s;
}

.button:hover {
    background: #757575; /* чуть светлее при наведении */
}
</style>
</head>

<body>

<div class="container">
    <h1>MIN_4IK</h1>
    <div id="buttons"></div>
</div>

<script>
// 👉 Добавляешь свои кнопки здесь
const links = [
    {name: "Telegram", url: "https://t.me/your"},
    {name: "YouTube", url: "https://youtube.com/your"},
    {name: "Discord", url: "#"}
];

const container = document.getElementById("buttons");

links.forEach(link => {
    const a = document.createElement("a");
    a.className = "button";
    a.href = link.url;
    a.innerText = link.name;
    a.target = "_blank";
    container.appendChild(a);
});
</
